<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <defs>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ff5a00" />
      <stop offset="100%" stop-color="#ff8a40" />
    </linearGradient>
  </defs>

  <!-- Dark rounded square background -->
  <rect width="512" height="512" rx="96" fill="#0a0a0f" />
  <rect x="4" y="4" width="504" height="504" rx="92" fill="none" stroke="rgba(255,255,255,0.06)" stroke-width="4" />

  <!-- Terminal bracket > -->
  <path d="M 155,155 L 300,256 L 155,357"
        fill="none"
        stroke="url(#accent)"
        stroke-width="40"
        stroke-linecap="round"
        stroke-linejoin="round" />

  <!-- Blinking cursor line -->
  <rect x="330" y="155" width="6" height="202" rx="3" fill="url(#accent)" opacity="0.7" />

  <!-- Dot grid (subtle branding element) -->
  <circle cx="400" cy="400" r="3" fill="rgba(255,255,255,0.08)" />
  <circle cx="424" cy="400" r="3" fill="rgba(255,255,255,0.08)" />
  <circle cx="448" cy="400" r="3" fill="rgba(255,255,255,0.08)" />
  <circle cx="400" cy="424" r="3" fill="rgba(255,255,255,0.08)" />
  <circle cx="424" cy="424" r="3" fill="rgba(255,255,255,0.08)" />
  <circle cx="448" cy="424" r="3" fill="rgba(255,255,255,0.08)" />
</svg>
