services:
  - type: web
    name: llm-powered-devops-failure-analysis
    runtime: docker
    plan: free
    region: oregon
    dockerfilePath: ./Dockerfile
    dockerContext: .
    autoDeployTrigger: commit
    healthCheckPath: /health
    envVars:
      - key: GEMINI_API_KEY
        sync: false
      - key: GEMINI_MODEL
        value: gemini-3.1-flash-lite-preview
      - key: ENVIRONMENT
        value: production
      - key: MAX_LOG_CHARS
        value: "20000"
      - key: RATE_LIMIT_REQUESTS
        value: "10"
      - key: RATE_LIMIT_WINDOW_SECONDS
        value: "60"
      - key: SERVE_FRONTEND
        value: "true"
